    <!-- Location Rating -->
    <div id="book">
      <form action="{{ url_for('add_trip') }}" method="post">
        <label for="location">Where'd you go?</label>
        <input type="text" id="location" name="location" required /><br /><br />

        <label for="arrival_date">Arrival Date:</label>
        <input
          type="date"
          id="arrival_date"
          name="arrival_date"
          required
        /><br /><br />

        <label for="departure_date">Departure Date:</label>
        <input
          type="date"
          id="departure_date"
          name="departure_date"
          required
        /><br /><br />

        <label for="adults">Adults:</label>
        <input
          type="number"
          id="adults"
          name="adults"
          min="1"
          value="1"
          required
        /><br /><br />

        <label for="children">Children:</label>
        <input
          type="number"
          id="children"
          name="children"
          min="0"
          value="0"
        /><br /><br />

        <label for="children">Rating:</label>
        <input
          type="number"
          id="rating"
          name="rating"
          min="0"
          value="0"
        /><br /><br />
        <input type="submit" value="Submit" />
      </form>
    </div>
<!-- put in for loop to display results add a delete ability -->
    <!-- functionality of image loops -->
    <script>
      var currentImage = 1;
      var totalImages = 3;

      function nextImage() {
        document.getElementById("image" + currentImage).style.display = "none";
        currentImage = (currentImage % totalImages) + 1;
        document.getElementById("image" + currentImage).style.display = "block";
      }
    </script>
  </body>
