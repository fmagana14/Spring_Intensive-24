    <!-- Location Rating -->
    <div id="book">
      <form action="{{ url_for('add_trip') }}" method="post">
        <label for="location">Where'd you go?</label>
        <input type="text" id="location" name="location" required /><br /><br />

        <label for="arrival_date">Arrival Date:</label>
        <input
          type="date"
          id="arrival_date"
          name="arrival_date"
          required
        /><br /><br />

        <label for="departure_date">Departure Date:</label>
        <input
          type="date"
          id="departure_date"
          name="departure_date"
          required
        /><br /><br />

        <label for="adults">Adults:</label>
        <input
          type="number"
          id="adults"
          name="adults"
          min="1"
          value="1"
          required
        /><br /><br />

        <label for="children">Children:</label>
        <input
          type="number"
          id="children"
          name="children"
          min="0"
          value="0"
        /><br /><br />

        <label for="children">Rating:</label>
        <input
          type="number"
          id="rating"
          name="rating"
          min="0"
          value="0"
        /><br /><br />
        <input type="submit" value="Submit" />
      </form>
    </div>
    <!-- put in for loop to display results add a delete ability -->
    <div id="trips">
      <h2>All Trips</h2>
      <table>
        <thead>
          <tr>
            <th>Location</th>
            <th>Arrival Date</th>
            <th>Departure Date</th>
            <th>Adults</th>
            <th>Children</th>
            <th>Rating</th>
          </tr>
        </thead>
        <tbody>
          {% for trip in trips %}
          <tr>
            <td>{{ trip.location }}</td>
            <td>{{ trip.arrival_date }}</td>
            <td>{{ trip.departure_date }}</td>
            <td>{{ trip.adults }}</td>
            <td>{{ trip.children }}</td>
            <td>{{ trip.rating }}</td>
            <td>
              <form action="/delete_trip/{{ trip._id }}" method="post" onsubmit="return confirm('Are you sure you want to delete this trip?')">
                <input type="hidden" name="_method" value="DELETE">
                <button type="submit">Delete</button>
            </td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
    <!-- discription box -->
    <div id="description-section">
